<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Administration · Clémence</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Raleway', sans-serif;
            background: #0a0a0a;
            color: #f8f6f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 100%;
            max-width: 380px;
            padding: 48px 40px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #111;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-align: center;
            margin-bottom: 8px;
        }
        .logo em { font-style: italic; color: #c9a96e; }
        .subtitle {
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            text-align: center;
            margin-bottom: 40px;
        }
        label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f8f6f2;
            font-family: 'Raleway', sans-serif;
            font-size: 14px;
            margin-bottom: 24px;
            outline: none;
            transition: border 0.2s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus { border-color: #c9a96e; }
        button {
            width: 100%;
            padding: 14px;
            background: #c9a96e;
            color: #0a0a0a;
            border: none;
            font-family: 'Raleway', sans-serif;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #b8935a; }
        .error {
            font-size: 12px;
            color: #e24b4a;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><em>Clémence</em></div>
    <p class="subtitle">Administration</p>
    <label>Utilisateur</label>
    <input type="text" id="usuario" placeholder="clemence" onkeydown="if(event.key==='Enter') login()">
    <label>Mot de passe</label>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Accéder</button>
    <p class="error" id="error">Utilisateur ou mot de passe incorrect</p>
</div>
<script>
async function login() {
    const usuario = document.getElementById('usuario').value
    const pwd = document.getElementById('pwd').value
    const res = await fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, password: pwd })
    })
    if (res.ok) {
        window.location.href = '/admin'
    } else {
        document.getElementById('error').style.display = 'block'
    }
}
</script>
</body>
</html>
